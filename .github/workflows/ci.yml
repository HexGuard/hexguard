name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  root-shell:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root shell dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

  angular:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: pnpm
          cache-dependency-path: angular/pnpm-lock.yaml

      - name: Install Angular workspace dependencies
        run: pnpm --dir angular install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --dir angular exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test:ci

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Build packages and apps
        run: pnpm build

      - name: Verify package artifact
        run: pnpm verify:package

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            angular/playwright-report
            angular/test-results
          if-no-files-found: ignore

  dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate .NET workspace
        run: |
          pnpm dotnet:restore
          pnpm dotnet:build
          pnpm dotnet:test
