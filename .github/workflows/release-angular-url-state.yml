name: Release Angular URL State

on:
  push:
    tags:
      - 'angular-url-state-v*'
  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'npm dist-tag to publish under'
        required: false
        default: 'latest'
      create_github_release:
        description: 'Create a GitHub release for the current tag'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish @hexguard/angular-url-state
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            angular/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install root shell dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Angular workspace dependencies
        run: pnpm --dir angular install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --dir angular exec playwright install --with-deps chromium

      - name: Validate workspace
        run: |
          pnpm format:check
          pnpm lint
          pnpm test:ci
          pnpm test:e2e

      - name: Build library
        run: pnpm build:lib:url-state

      - name: Verify package artifact
        run: pnpm verify:package:url-state

      - name: Resolve publish metadata
        id: metadata
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./angular/packages/angular-url-state/package.json').version")
          PACKAGE_NAME=$(node -p "require('./angular/packages/angular-url-state/package.json').name")
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            EXPECTED_TAG="angular-url-state-v${PACKAGE_VERSION}"

            if [[ "$TAG_NAME" != "$EXPECTED_TAG" ]]; then
              echo "Tag $TAG_NAME does not match package version $PACKAGE_VERSION (expected $EXPECTED_TAG)." >&2
              exit 1
            fi
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            NPM_TAG="${{ inputs.npm_tag }}"
            CREATE_RELEASE="${{ inputs.create_github_release }}"
          else
            NPM_TAG="latest"
            CREATE_RELEASE="true"
          fi

          TARBALL_PATH=$(find angular/.artifacts -maxdepth 1 -name '*.tgz' -print -quit)

          if [[ -z "$TARBALL_PATH" ]]; then
            echo 'No package tarball was produced in angular/.artifacts.' >&2
            exit 1
          fi

          {
            echo "package_name=$PACKAGE_NAME"
            echo "package_version=$PACKAGE_VERSION"
            echo "tag_name=$TAG_NAME"
            echo "npm_tag=$NPM_TAG"
            echo "create_release=$CREATE_RELEASE"
            echo "tarball_path=$TARBALL_PATH"
          } >> "$GITHUB_OUTPUT"

      - name: Publish package to npm
        run: |
          pnpm --dir angular/dist/angular-url-state publish --no-git-checks --access public --provenance --tag "${{ steps.metadata.outputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.metadata.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          name: ${{ steps.metadata.outputs.package_name }}@${{ steps.metadata.outputs.package_version }}
          generate_release_notes: true
          files: ${{ steps.metadata.outputs.tarball_path }}

      - name: Summarize publish
        run: |
          echo "Published ${{ steps.metadata.outputs.package_name }}@${{ steps.metadata.outputs.package_version }} with npm tag '${{ steps.metadata.outputs.npm_tag }}'." >> "$GITHUB_STEP_SUMMARY"
          echo "GitHub release tag: ${{ steps.metadata.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
