name: Release Angular Confirmation

on:
  push:
    tags: [ 'angular-confirmation-v*' ]
  workflow_dispatch:
    inputs:
      npm_tag: { description: 'npm dist-tag', required: false, default: 'latest' }
      release_tag: { description: 'Git tag', required: false, default: '' }
      create_github_release: { description: 'Create a GitHub release', required: false, type: boolean, default: false }

permissions: { contents: write, id-token: write }

jobs:
  publish:
    name: Publish @hexguard/angular-confirmation
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 10.27.0, run_install: false }
      - uses: actions/setup-node@v4
        with: { node-version: 22.22.3, cache: pnpm, cache-dependency-path: "pnpm-lock.yaml\nangular/pnpm-lock.yaml", registry-url: 'https://registry.npmjs.org' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir angular install --frozen-lockfile
      - run: pnpm build:lib:confirmation
      - run: pnpm verify:package:confirmation
      - name: Publish
        run: pnpm --dir angular/dist/angular-confirmation publish --no-git-checks --access public --provenance --tag "${{ steps.metadata.outputs.npm_tag }}"
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
