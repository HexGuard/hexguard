name: Release Angular Icon Registry

on:
  push:
    tags: ['angular-icon-registry-v*']
  workflow_dispatch:
    inputs:
      npm_tag: { description: 'npm dist-tag', required: false, default: 'latest' }
      release_tag: { description: 'Git tag for manual release', required: false, default: '' }
      create_github_release:
        { description: 'Create GitHub release', required: false, type: boolean, default: false }

permissions: { contents: write, id-token: write }

jobs:
  publish:
    name: Publish @hexguard/angular-icon-registry
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 10.27.0, run_install: false }
      - uses: actions/setup-node@v4
        with:
          {
            node-version: 22.22.3,
            cache: pnpm,
            cache-dependency-path: "pnpm-lock.yaml\nangular/pnpm-lock.yaml",
            registry-url: 'https://registry.npmjs.org',
          }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir angular install --frozen-lockfile
      - run: pnpm build:lib:icon-registry
      - run: pnpm verify:package:icon-registry
      - name: Resolve publish metadata
        id: metadata
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./angular/packages/angular-icon-registry/package.json').version")
          PACKAGE_NAME=$(node -p "require('./angular/packages/angular-icon-registry/package.json').name")
          echo "tag_name=angular-icon-registry-v${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${{ inputs.npm_tag || 'latest' }}" >> "$GITHUB_OUTPUT"
      - name: Publish to npm
        run: pnpm --dir angular/dist/angular-icon-registry publish --no-git-checks --access public --provenance --tag "${{ steps.metadata.outputs.npm_tag }}"
        env: { NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}' }
