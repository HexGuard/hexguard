name: Release Angular Upload State

on:
  push:
    tags:
      - 'angular-upload-state-v*'
  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'npm dist-tag to publish under'
        required: false
        default: 'latest'
      release_tag:
        description: 'Git tag to attach the GitHub release to when running manually'
        required: false
        default: ''
      create_github_release:
        description: 'Create a GitHub release for the current tag'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish @hexguard/angular-upload-state
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Angular workspace dependencies
        run: pnpm --dir angular install --frozen-lockfile

      - name: Build
        run: pnpm --dir angular build:lib:upload-state

      - name: Test
        run: pnpm --dir angular test:lib:upload-state

      - name: Publish
        run: |
          TAG="${{ inputs.npm_tag || 'latest' }}"
          pnpm --dir angular/dist/angular-upload-state publish --access public --no-git-checks --tag "$TAG"

      - name: Create GitHub release
        if: ${{ github.ref_type == 'tag' || inputs.create_github_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          generate_release_notes: true
